name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ruby をセットアップ
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.2'
          bundler-cache: true

      - name: データベースを準備
        env:
          RAILS_ENV: test
        run: bin/rails db:prepare

      - name: テストを実行
        env:
          RAILS_ENV: test
        run: bin/rails test
